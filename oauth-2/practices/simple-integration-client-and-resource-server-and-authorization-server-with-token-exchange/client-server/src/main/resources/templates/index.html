<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>OAuth2.0 Client</title>
    <script>
        function fetchAccessToken() {
            fetch("/token")
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch token");
                    }
                    return response.json();
                })
                .then(data => {
                    console.log("Received token:", data.tokenValue);

                    // 화면에 표시
                    const tokenDisplay = document.getElementById("accessTokenDisplay");
                    tokenDisplay.textContent = data.tokenValue;
                })
                .catch(error => {
                    console.error("Token fetch error:", error);
                    alert("Access token 요청 실패: " + error.message);
                });
        }

        function fetchArticle() {
            const articleId = document.getElementById("articleId").value;
            fetch(`/article/${articleId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch article");
                    }
                    return response.json();
                })
                .then(data => {
                    const articleDisplay = document.getElementById("articleDisplay");
                    articleDisplay.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error("Article fetch error:", error);
                    alert("Article 요청 실패: " + error.message);
                });
        }

        function fetchArticles() {
            fetch("/articles")
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch articles");
                    }
                    return response.json();
                })
                .then(data => {
                    const articleDisplay = document.getElementById("articleDisplay");
                    articleDisplay.textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error("Articles fetch error:", error);
                    alert("Articles 요청 실패: " + error.message);
                });
        }
    </script>
</head>
<body>
<h2>OAuth2.0 Client</h2>

<div sec:authorize="isAnonymous()">
    <a th:href="@{/oauth2/authorization/my-spring-client}">Login with My Authorization Server</a>
</div>

<div sec:authorize="isAuthenticated()">
    <div>
        <label for="articleId">Article ID:</label>
        <input type="number" id="articleId" value="1" min="1"/>
        <button type="button" onclick="fetchArticle()">Get Article</button>
        <button type="button" onclick="fetchArticles()">Get All Articles</button>
    </div>
    <button type="button" onclick="fetchAccessToken()">Get Access Token</button>
    <div>
        <a th:href="@{/logout}">Logout</a>
    </div>

    <h3>Article:</h3>
    <pre id="articleDisplay" style="white-space:pre-wrap; word-break:break-word;"></pre>

    <h3>Your Access Token:</h3>
    <pre id="accessTokenDisplay" style="white-space:pre-wrap; word-break:break-word;"></pre>
</div>
</body>
</html>
