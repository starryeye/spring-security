<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Authorization Server - Consent</title>
</head>
<body>
<h2>커스텀 동의 페이지</h2>
<p>
    <b th:text="${clientName}">client</b> 이(가) <b th:text="${principalName}">user</b> 계정에 대한 접근 권한을 요청합니다.
</p>

<!-- 제출은 기본 consent 페이지와 동일하게 POST "/oauth2/authorize", client_id 와 state 는 그대로 되돌려준다 -->
<form th:action="@{/oauth2/authorize}" method="post">
    <input type="hidden" name="client_id" th:value="${clientId}"/>
    <input type="hidden" name="state" th:value="${state}"/>

    <div th:if="${!previouslyApprovedScopes.isEmpty()}">
        <h3>이미 동의한 권한</h3>
        <!-- 기승인 scope 는 다시 물어보지 않고 표시만 한다 (disabled 라 제출 값에 포함되지 않아도 기승인은 유지된다) -->
        <p th:each="approvedScope : ${previouslyApprovedScopes}">
            <label><input type="checkbox" checked disabled/> <span th:text="${approvedScope}">scope</span></label>
        </p>
    </div>

    <div th:if="${!scopesToApprove.isEmpty()}">
        <h3>새로 요청된 권한</h3>
        <p th:each="scope : ${scopesToApprove}">
            <label><input type="checkbox" name="scope" th:value="${scope}"/> <span th:text="${scope}">scope</span></label>
        </p>
    </div>

    <!-- 기승인이 전혀 없는 상태에서 아무 scope 도 체크하지 않고 제출하면 거부(access_denied)로 처리된다 -->
    <p>
        <button type="submit">동의</button>
    </p>
</form>
</body>
</html>
