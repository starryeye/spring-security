server:
  port: 8091 # 두번째 인스턴스는 --server.port=8092 로 기동 (README 참고)

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/production_ready_authorization_server
    username: root
    password: 1111
  jpa:
    hibernate:
      # 서버를 재기동해도 client 등록/동의 정보가 유지되는 것을 확인하기 위해 update 로 설정
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  session:
    redis:
      # principal 이름으로 세션을 찾을 수 있는 인덱스 저장 방식.. 공유 SessionRegistry 의 전제 (SpringSessionSessionRegistry 참고)
      repository-type: indexed

# keystore 기반 JWKSource 설정 (jpa/advance/custom-jwk-source 프로젝트 참고)
my:
  issuer: http://localhost:9000 # 대표 주소(LB).. 토큰의 iss 와 메타데이터 URL 에 쓰인다 (AuthorizationServerConfig 참고)
  bootstrap-admin:
    username: admin # 최초 관리자 계정 (AdminAccountInitializer.. 운영이라면 환경변수/secret 으로 주입)
    password: "1234"
  jwk:
    key-store-location: classpath:keystore/token-signing.p12
    key-store-password: "111111"
    key-password: "111111"
    current-key-alias: key-2026-07-15
    previous-key-alias: key-2026-07-01

logging:
  level:
    org.springframework.security: DEBUG
