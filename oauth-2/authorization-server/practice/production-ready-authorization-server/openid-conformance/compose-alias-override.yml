# docker compose -f docker-compose-prebuilt.yml -f compose-alias-override.yml up -d
# suite 컨테이너 내부의 자동화 브라우저(selenium)가 콜백 주소(localhost.emobix.co.uk:8443)에 접근할 수 있도록
# nginx 서비스에 docker 네트워크 alias 를 부여한다.
#   이 도메인은 공개 DNS 가 127.0.0.1 로 해석하므로 suite "컨테이너 안"에서는 자기 자신을 가리켜 connection refused 가 난다.
#   alias 를 주면 docker 내장 DNS 가 공개 DNS 보다 우선하여 nginx 컨테이너로 해석된다.
services:
  nginx:
    networks:
      default:
        aliases:
          - localhost.emobix.co.uk
