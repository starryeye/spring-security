# 로드밸런서 설정..
# upstream 기본 방식(round robin)이라 요청마다 두 인스턴스에 번갈아 분배된다.
#   -> 한 번의 authorization code grant 흐름(로그인 -> 동의 -> code -> token)이 여러 인스턴스에 걸쳐 처리된다.
#      그런데도 흐름이 끊기지 않는 것이 이 프로젝트의 핵심이다. (세션/토큰 상태가 전부 외부 저장소에 있으므로)
# proxy_set_header 로 항상 덮어쓰므로 외부 클라이언트가 조작해서 보낸 X-Forwarded-* 는 무시된다. (신뢰 경계.. etc/forwarded-header-filter 프로젝트 참고)
# 주의. upstream 이름에 underscore 를 쓰면 안 된다..
#   proxy_pass 가 Host 헤더 기본값으로 upstream 이름을 전달하는데, tomcat 이 underscore 포함 host 를 유효하지 않은 것으로 보고 400 을 반환한다. (직접 겪음)
upstream authorization-server {
    server host.docker.internal:8091;
    server host.docker.internal:8092;
}

server {
    listen 80;

    location / {
        proxy_pass http://authorization-server;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
