# docker-compose -p production-ready-authorization-server up -d
# nginx(host 9000)가 로드밸런서로 두 인스턴스(host 8091, 8092)에 분배하고, mysql/redis 는 저장소 인프라이다.

services:
  nginx:
    image: nginx:1.27
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 1111
      MYSQL_DATABASE: production_ready_authorization_server
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
